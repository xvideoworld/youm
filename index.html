<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Allura', cursive;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding-bottom: 60px;
  background: linear-gradient(135deg,
    #a8edea 0%,
    #fed6e3 30%,
    #d4b8ff 60%,
    #ffecd2 100%);
}

body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  top: -200px;
  left: -200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168,237,234,0.8), rgba(254,214,227,0.4));
  filter: blur(80px);
  z-index: 0;
  animation: drift1 8s ease-in-out infinite;
}

body::after {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  bottom: -150px;
  right: -150px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,184,255,0.8), rgba(255,236,210,0.4));
  filter: blur(80px);
  z-index: 0;
  animation: drift2 10s ease-in-out infinite;
}

@keyframes drift1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(60px, 40px); }
}

@keyframes drift2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-40px, -60px); }
}

.container {
  width: 95%;
  max-width: 900px;
  margin: auto;
  position: relative;
  z-index: 5;
}

.glass {
  background: rgba(255, 255, 255, 0.28);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.6);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.05),
    inset 0 1px 1px rgba(255, 255, 255, 0.9);
}

.hero {
  margin-top: 25px;
  padding: 35px 40px;
  border-radius: 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: float 6s ease-in-out infinite;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 65px;
  color: #1a1a1a;
  line-height: 1.1;
  position: relative;
  z-index: 2;
}

.hero p {
  margin-top: 15px;
  font-size: 32px;
  color: #222;
  line-height: 1.3;
  position: relative;
  z-index: 2;
}

.rain-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.drop {
  position: absolute;
  bottom: 100%;
  width: 2.5px;
  height: 25px;
  background: linear-gradient(transparent, rgba(255, 255, 255, 0.9));
  box-shadow: 0px 0px 4px rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  animation: fall 4s linear infinite;
}

.drop:nth-child(1) { left: 5%; animation-delay: 0s; animation-duration: 3.5s; }
.drop:nth-child(2) { left: 18%; animation-delay: 0.8s; animation-duration: 4.2s; }
.drop:nth-child(3) { left: 32%; animation-delay: 1.5s; animation-duration: 3.8s; }
.drop:nth-child(4) { left: 48%; animation-delay: 0.3s; animation-duration: 4.5s; }
.drop:nth-child(5) { left: 62%; animation-delay: 1.2s; animation-duration: 4s; }
.drop:nth-child(6) { left: 75%; animation-delay: 2.2s; animation-duration: 3.6s; }
.drop:nth-child(7) { left: 88%; animation-delay: 0.5s; animation-duration: 4.3s; }
.drop:nth-child(8) { left: 12%; animation-delay: 1.9s; animation-duration: 3.9s; }
.drop:nth-child(9) { left: 40%; animation-delay: 2.7s; animation-duration: 4.1s; }
.drop:nth-child(10) { left: 83%; animation-delay: 1.1s; animation-duration: 3.7s; }

@keyframes fall {
  0% { transform: translateY(-30px); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateY(450px); opacity: 0; }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.grid {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.card {
  padding: 10px;
  border-radius: 30px;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  animation: fadeUp 0.8s ease both;
}

.card:hover {
  transform: translateY(-8px) scale(1.01);
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
}

.img-wrapper {
  border-radius: 22px;
  overflow: hidden;
  width: 100%;
  line-height: 0;
}

.card img {
  width: 100%;
  height: auto;
  min-height: 150px;
  display: block;
  object-fit: contain;
  background: rgba(255,255,255,0.1);
  transition: transform 0.5s ease;
}

.card:hover img {
  transform: scale(1.03);
}

.download-btn {
  display: block;
  margin-top: 10px;
  width: 100%;
  text-align: center;
  text-decoration: none;
  font-family: 'Allura', cursive;
  font-size: 32px;
  color: #1a1a1a;
  padding: 10px 15px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.7);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.9);
  transition: transform 0.3s ease, background 0.3s ease;
  cursor: pointer;
}

.download-btn:hover {
  transform: scale(1.02);
  background: rgba(255, 255, 255, 0.5);
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .hero {
    padding: 35px 30px;
    margin-top: 25px;
    border-radius: 40px;
  }
  .hero h1 {
    font-size: 65px;
  }
  .hero p {
    font-size: 32px;
    margin-top: 15px;
    line-height: 1.3;
  }
  .download-btn {
    font-size: 32px;
    padding: 10px 15px;
    border-radius: 20px;
  }
  .card {
    padding: 10px;
    border-radius: 30px;
  }
  .img-wrapper {
    border-radius: 22px;
  }
}

</style>
</head>
<body>

      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>

    <h1>Welcome</h1>

  </div>

  <div class="grid">

      </div>

    <div class="card glass">

      <button onclick="triggerDownload('https://i.postimg.cc/tCGqjJt3/5cfa92a595c878a0c420e86a5e51f053.jpg', 'visual-3.jpg')" class="download-btn">Download</button>
    </div>

    <div class="card glass">

    <div class="card glass">

    </div>

  </div>
</div>

<script>
function triggerDownload(imgUrl, fileName) {
  fetch(imgUrl)
    .then(response => response.blob())
    .then(blob => {
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
    })
    .catch(() => {
      window.open(imgUrl, '_blank');
    });
}
</script>

</body>
</html>
