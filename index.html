<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Comfortaa:wght@500&display=swap" rel="stylesheet">
<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Allura', cursive;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding-bottom: 40px;
  background: linear-gradient(135deg,
    #a8edea 0%,
    #fed6e3 30%,
    #d4b8ff 60%,
    #ffecd2 100%);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  top: -200px;
  left: -200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168,237,234,0.8), rgba(254,214,227,0.4));
  filter: blur(80px);
  z-index: 0;
  animation: drift1 12s ease-in-out infinite;
  will-change: transform;
}

body::after {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  bottom: -150px;
  right: -150px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,184,255,0.8), rgba(255,236,210,0.4));
  filter: blur(80px);
  z-index: 0;
  animation: drift2 15s ease-in-out infinite;
  will-change: transform;
}

@keyframes drift1 {
  0%, 100% { transform: translate3d(0, 0, 0); }
  50% { transform: translate3d(60px, 40px, 0); }
}

@keyframes drift2 {
  0%, 100% { transform: translate3d(0, 0, 0); }
  50% { transform: translate3d(-40px, -60px, 0); }
}

.container {
  width: 92%;
  max-width: 800px;
  margin: auto;
  position: relative;
  z-index: 5;
}

.glass {
  background: rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(25px) saturate(180%);
  -webkit-backdrop-filter: blur(25px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.6);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.03),
    inset 0 1px 2px rgba(255, 255, 255, 0.8);
}

.hero {
  margin-top: 20px;
  padding: 25px 25px;
  border-radius: 30px;
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: float 6s ease-in-out infinite;
  will-change: transform;
}

.hero h1 {
  font-family: 'Comfortaa', sans-serif;
  font-size: 34px;
  color: #1a1a1a;
  line-height: 1.2;
  position: relative;
  z-index: 5;
}

.hero p {
  margin-top: 12px;
  font-size: 21px;
  color: #222;
  line-height: 1.3;
  position: relative;
  z-index: 5;
}

/* Glass Surface Rain Drops Overlay */
.rain-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  pointer-events: none;
  overflow: hidden;
}

.drop {
  position: absolute;
  bottom: 100%;
  width: 3px;
  height: 24px;
  background: linear-gradient(transparent, rgba(255, 255, 255, 0.95));
  border-radius: 50%;
  box-shadow: 0px 2px 5px rgba(255, 255, 255, 0.8);
  animation: fall 5s linear infinite;
  will-change: transform;
}

.drop:nth-child(1) { left: 6%; animation-delay: 0s; animation-duration: 4.8s; width: 3.5px; }
.drop:nth-child(2) { left: 19%; animation-delay: 1.2s; animation-duration: 5.5s; width: 2.5px; }
.drop:nth-child(3) { left: 34%; animation-delay: 2.5s; animation-duration: 4.2s; width: 3px; }
.drop:nth-child(4) { left: 52%; animation-delay: 0.4s; animation-duration: 6s; width: 4px; }
.drop:nth-child(5) { left: 68%; animation-delay: 3.1s; animation-duration: 5.1s; width: 2px; }
.drop:nth-child(6) { left: 82%; animation-delay: 1.8s; animation-duration: 4.6s; width: 3.2px; }
.drop:nth-child(7) { left: 93%; animation-delay: 0.8s; animation-duration: 5.8s; width: 2.8px; }
.drop:nth-child(8) { left: 43%; animation-delay: 2.1s; animation-duration: 4.9s; width: 3.5px; }

@keyframes fall {
  0% { transform: translate3d(0, -30px, 0); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.8; }
  100% { transform: translate3d(0, 350px, 0); opacity: 0; }
}

@keyframes float {
  0%, 100% { transform: translate3d(0, 0, 0); }
  50% { transform: translate3d(0, -6px, 0); }
}

/* Dynamic Grid with Natural Image Heights */
.grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.card {
  padding: 8px;
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: max-content;
  transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
  animation: fadeUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) both;
  will-change: transform;
}

.card:hover {
  transform: translate3d(0, -5px, 0) scale(1.01);
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
}

.img-wrapper {
  border-radius: 18px;
  overflow: hidden;
  width: 100%;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: auto;
  display: block;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
  transition: transform 0.4s ease;
}

.card:hover img {
  transform: scale(1.02);
}

.download-btn {
  display: block;
  margin-top: 10px;
  width: 100%;
  text-align: center;
  text-decoration: none;
  font-family: 'Allura', cursive;
  font-size: 25px;
  color: #1a1a1a;
  padding: 6px 12px;
  border-radius: 15px;
  background: rgba(255, 255, 255, 0.32);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.7);
  transition: transform 0.2s ease, background 0.2s ease;
  cursor: pointer;
}

.download-btn:hover {
  transform: scale(1.02);
  background: rgba(255, 255, 255, 0.45);
}

/* LIGHTBOX MODAL SYSTEM */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  display: none;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.lightbox.active {
  display: flex;
  opacity: 1;
}

.lightbox-content {
  width: 90%;
  max-width: 480px;
  background: rgba(255, 255, 255, 0.22);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 32px;
  padding: 15px;
  text-align: center;
  position: relative;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.close-btn {
  position: absolute;
  top: -15px;
  right: -15px;
  width: 38px;
  height: 38px;
  background: rgba(255, 255, 255, 0.85);
  border: none;
  border-radius: 50%;
  font-size: 24px;
  color: #1a1a1a;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1010;
}

.lightbox-main-img {
  width: 100%;
  max-height: 52vh;
  object-fit: contain;
  border-radius: 20px;
}

.lightbox .download-btn {
  width: 85%;
  margin-top: 12px;
  margin-bottom: 12px;
}

.lightbox-carousel {
  width: 100%;
  overflow-x: auto;
  white-space: nowrap;
  padding: 8px 4px;
  border-top: 1px solid rgba(255,255,255,0.25);
  scrollbar-width: thin;
}

.lightbox-carousel::-webkit-scrollbar {
  height: 4px;
}
.lightbox-carousel::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.4);
  border-radius: 10px;
}

.thumb-img {
  width: 55px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
  margin-right: 8px;
  cursor: pointer;
  display: inline-block;
  border: 2px solid transparent;
  transition: transform 0.2s, border-color 0.2s;
}

.thumb-img.active-thumb {
  border-color: #1a1a1a;
  transform: scale(1.04);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translate3d(0, 20px, 0); }
  to { opacity: 1; transform: translate3d(0, 0, 0); }
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .hero {
    padding: 18px 20px;
    margin-top: 15px;
  }
  .hero h1 { font-size: 28px; }
  .hero p { font-size: 16px; line-height: 1.3; }
  .download-btn { font-size: 22px; padding: 5px 10px; }
}

</style>
</head>
<body>

    <div class="rain-container">

      <div class="drop"></div>

      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
    </div>

    <h1>Welcome</h1>

      You can download anything you want from this website and use it freely

      cinematic backgrounds, aesthetic clips and high quality content to make

</div>

<div class="lightbox" id="imageLightbox">

const gridContainer = document.getElementById('galleryGrid');
const carouselContainer = document.getElementById('lightboxCarousel');
const lightbox = document.getElementById('imageLightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxDownloadBtn = document.getElementById('lightboxDownloadBtn');

images.forEach((url, index) => {
  const card = document.createElement('div');
  card.className = 'card glass';
  card.innerHTML = `
    <div class="img-wrapper" onclick="openLightbox(${index})">
      <img src="${url}" alt="Visual ${index + 1}" loading="lazy">
    </div>
    <button onclick="triggerDownload('${url}', 'visual-${index + 1}.jpg')" class="download-btn">Download</button>
  `;
  gridContainer.appendChild(card);

  const thumb = document.createElement('img');
  thumb.src = url;
  thumb.className = 'thumb-img';
  thumb.id = `thumb-${index}`;
  thumb.onclick = () => selectLightboxImage(index);
  carouselContainer.appendChild(thumb);
});

let currentIndex = 0;

function openLightbox(index) {
  lightbox.classList.add('active');
  selectLightboxImage(index);
}

function closeLightbox() {
  lightbox.classList.remove('active');
}

function selectLightboxImage(index) {
  currentIndex = index;
  const targetUrl = images[index];
  
  lightboxImg.src = targetUrl;
  lightboxDownloadBtn.setAttribute('onclick', `triggerDownload('${targetUrl}', 'visual-${index + 1}.jpg')`);

  document.querySelectorAll('.thumb-img').forEach(img => img.classList.remove('active-thumb'));
  const activeThumb = document.getElementById(`thumb-${index}`);
  if (activeThumb) {
    activeThumb.classList.add('active-thumb');
    activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function triggerDownload(imgUrl, fileName) {
  fetch(imgUrl)
    .then(response => response.blob())
    .then(blob => {
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
    })
    .catch(() => {
      window.open(imgUrl, '_blank');
    });
}

lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) {
    closeLightbox();
  }
});
