<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>𝒢𝑒𝓂𝒾𝓃𝒾</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Tangerine:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(135deg,#ffffff,#f7f7f7,#ececec);

    min-height:100vh;

    overflow-x:hidden;

    position:relative;
}

/* WATER LIGHT EFFECT */

.water1,
.water2,
.water3{
    position:absolute;
    border-radius:50%;

    background:rgba(255,255,255,.7);

    filter:blur(90px);

    animation:float 8s ease-in-out infinite;
}

.water1{
    width:320px;
    height:320px;
    top:-120px;
    left:-80px;
}

.water2{
    width:260px;
    height:260px;
    right:-50px;
    top:250px;
    animation-delay:2s;
}

.water3{
    width:240px;
    height:240px;
    bottom:-50px;
    left:30%;
    animation-delay:4s;
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(25px);
}

100%{
transform:translateY(0px);
}

}

/* NAVBAR */

.navbar{
    width:100%;
    padding:25px 7%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    position:relative;
    z-index:5;
}

.logo{
    font-family:'Tangerine',cursive;

    font-size:60px;

    color:#777;

    text-shadow:
    -3px -3px 8px #ffffff,
     3px 3px 8px #d7d7d7;
}

.menu{
    display:flex;
    gap:18px;
}

.menu a{

    text-decoration:none;

    font-family:'Tangerine',cursive;

    font-size:34px;

    color:#777;

    padding:12px 25px;

    border-radius:20px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px);

    box-shadow:
    -6px -6px 12px #ffffff,
     6px 6px 12px #d7d7d7,
     inset 1px 1px 1px rgba(255,255,255,.8);

    transition:.3s;
}

.menu a:hover{
    transform:translateY(-4px);
}

/* HERO */

.hero{

    width:90%;

    margin:20px auto;

    border-radius:40px;

    padding:35px;

    background:rgba(255,255,255,.45);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.7);

    box-shadow:
    -10px -10px 30px #ffffff,
     10px 10px 30px #d8d8d8,
     inset 2px 2px 3px rgba(255,255,255,.8);

    position:relative;

    z-index:5;
}

.hero-content{
    display:flex;
    gap:40px;
    align-items:center;
    flex-wrap:wrap;
}

.hero-text{
    flex:1;
}

.hero-text h1{

    font-family:'Tangerine',cursive;

    font-size:110px;

    line-height:1;

    color:#777;

    margin-bottom:15px;
}

.hero-text p{

    font-family:'Tangerine',cursive;

    font-size:42px;

    color:#8a8a8a;

    line-height:1.3;

    margin-bottom:25px;
}

.hero-btn{

    display:inline-block;

    padding:14px 35px;

    border-radius:25px;

    text-decoration:none;

    font-family:'Tangerine',cursive;

    font-size:34px;

    color:#777;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(15px);

    box-shadow:
    -6px -6px 12px #ffffff,
     6px 6px 12px #d8d8d8;

    transition:.3s;
}

.hero-btn:hover{
    transform:scale(1.05);
}

/* VIDEO */

.video-box{
    flex:1;
}

.video-box video{

    width:100%;

    border-radius:35px;

    background:white;

    box-shadow:
    -10px -10px 25px #ffffff,
     10px 10px 25px #d6d6d6;

}

/* SECTION */

.section{

    width:90%;

    margin:60px auto;

    position:relative;

    z-index:5;
}

.section-title{

    font-family:'Tangerine',cursive;

    font-size:60px;

    color:#777;

    margin-bottom:25px;
}

/* CARDS */

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));

    gap:30px;
}

.card{

    padding:18px;

    border-radius:30px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px);

    box-shadow:
    -8px -8px 18px #ffffff,
     8px 8px 18px #d6d6d6;

    transition:.4s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{

    width:100%;

    border-radius:22px;

    margin-bottom:15px;
}

.card h3{

    font-family:'Tangerine',cursive;

    font-size:42px;

    color:#777;

    margin-bottom:10px;
}

.card p{

    font-family:'Tangerine',cursive;

    font-size:28px;

    color:#8a8a8a;

    margin-bottom:15px;
}

.play{

    width:100%;

    border:none;

    padding:14px;

    border-radius:18px;

    cursor:pointer;

    font-family:'Tangerine',cursive;

    font-size:32px;

    color:#777;

    background:rgba(255,255,255,.6);

    box-shadow:
    inset -3px -3px 8px #ffffff,
    inset 3px 3px 8px #d8d8d8;
}

/* FOOTER */

.footer{

    text-align:center;

    padding:40px;

    font-family:'Tangerine',cursive;

    font-size:38px;

    color:#8a8a8a;
}

/* MOBILE */

@media(max-width:768px){

.hero-text h1{
    font-size:75px;
}

.hero-text p{
    font-size:32px;
}

.menu{
    display:none;
}

.hero{
    padding:20px;
}

}

</style>
</head>
