<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Comfortaa:wght@500&display=swap" rel="stylesheet">
<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Allura', cursive;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding-bottom: 40px;
  background: linear-gradient(135deg,
    #a8edea 0%,
    #fed6e3 30%,
    #d4b8ff 60%,
    #ffecd2 100%);
}

body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  top: -200px;
  left: -200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168,237,234,0.8), rgba(254,214,227,0.4));
  filter: blur(80px);
  z-index: 0;
  animation: drift1 8s ease-in-out infinite;
}

body::after {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  bottom: -150px;
  right: -150px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,184,255,0.8), rgba(255,236,210,0.4));
  filter: blur(80px);
  z-index: 0;
  animation: drift2 10s ease-in-out infinite;
}

@keyframes drift1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(60px, 40px); }
}

@keyframes drift2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-40px, -60px); }
}

.container {
  width: 92%;
  max-width: 800px;
  margin: auto;
  position: relative;
  z-index: 5;
}

.glass {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(25px) saturate(180%);
  -webkit-backdrop-filter: blur(25px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.55);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.04),
    inset 0 1px 1px rgba(255, 255, 255, 0.8);
}

.hero {
  margin-top: 20px;
  padding: 20px 25px;
  border-radius: 30px;
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: float 6s ease-in-out infinite;
}

.hero h1 {
  font-family: 'Comfortaa', sans-serif;
  font-size: 34px;
  color: #1a1a1a;
  line-height: 1.2;
  position: relative;
  z-index: 2;
}

.hero p {
  margin-top: 10px;
  font-size: 20px;
  color: #222;
  line-height: 1.3;
  position: relative;
  z-index: 2;
}

/* Rain Drop Styling */
.rain-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.drop {
  position: absolute;
  bottom: 100%;
  width: 1.5px;
  height: 20px;
  background: linear-gradient(transparent, rgba(255, 255, 255, 0.75));
  animation: fall 4s linear infinite;
}

.drop:nth-child(1) { left: 8%; animation-delay: 0s; animation-duration: 3.5s; }
.drop:nth-child(2) { left: 24%; animation-delay: 0.7s; animation-duration: 4.2s; }
.drop:nth-child(3) { left: 38%; animation-delay: 1.3s; animation-duration: 3.7s; }
.drop:nth-child(4) { left: 55%; animation-delay: 0.2s; animation-duration: 4.5s; }
.drop:nth-child(5) { left: 70%; animation-delay: 1.1s; animation-duration: 3.9s; }
.drop:nth-child(6) { left: 86%; animation-delay: 1.8s; animation-duration: 3.6s; }
.drop:nth-child(7) { left: 94%; animation-delay: 0.4s; animation-duration: 4.1s; }
.drop:nth-child(8) { left: 16%; animation-delay: 1.5s; animation-duration: 3.8s; }

@keyframes fall {
  0% { transform: translateY(-20px); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateY(300px); opacity: 0; }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.card {
  padding: 8px;
  border-radius: 24px;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  animation: fadeUp 0.8s ease both;
}

.card:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.06);
}

.img-wrapper {
  border-radius: 18px;
  overflow: hidden;
  width: 100%;
  line-height: 0;
}

.card img {
  width: 100%;
  height: auto;
  min-height: 140px;
  display: block;
  object-fit: contain;
  background: rgba(255,255,255,0.1);
  transition: transform 0.5s ease;
}

.card:hover img {
  transform: scale(1.03);
}

.download-btn {
  display: block;
  margin-top: 8px;
  width: 100%;
  text-align: center;
  text-decoration: none;
  font-family: 'Allura', cursive;
  font-size: 24px;
  color: #1a1a1a;
  padding: 6px 12px;
  border-radius: 15px;
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.65);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.8);
  transition: transform 0.3s ease, background 0.3s ease;
  cursor: pointer;
}

.download-btn:hover {
  transform: scale(1.02);
  background: rgba(255, 255, 255, 0.5);
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(25px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Mobile Friendly Optimization Without Breaking Layout */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .hero {
    padding: 18px 20px;
    margin-top: 15px;
  }
  .hero h1 {
    font-size: 28px;
  }
  .hero p {
    font-size: 16px;
    line-height: 1.3;
  }
  .download-btn {
    font-size: 22px;
    padding: 5px 10px;
  }
}

</style>
</head>
<body>

  </div>
</div>

<script>
function triggerDownload(imgUrl, fileName) {
  fetch(imgUrl)
    .then(response => response.blob())
    .then(blob => {
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
    })
    .catch(() => {
      window.open(imgUrl, '_blank');
    });
}
</script>
