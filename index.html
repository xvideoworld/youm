<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neumorphic App Platform</title>

<!-- স্টাইলিশ ও মডার্ন লুকের জন্য 'Syne' (হেডিং) এবং 'Nunito' (বডি) ফন্ট ব্যবহার করা হয়েছে -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#e9edf2;
  --dark:#222222;
  --light:#ffffff;
  --shadow1:#c7ccd1;
  --shadow2:#ffffff;
  --text-muted:#666666;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Nunito', sans-serif;
  background:var(--bg);
  color:var(--dark);
  min-height:100vh;
  padding-bottom:120px;
}

/* TOPBAR */

.topbar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px;
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
}

.logo{
  width:48px;
  height:48px;
  border-radius:16px;
  object-fit:cover;
  box-shadow:
  8px 8px 16px var(--shadow1),
  -8px -8px 16px var(--shadow2);
}

.search-wrap{
  flex:1;
  display:flex;
  align-items:center;
  border-radius:18px;
  overflow:hidden;
  background:var(--bg);
  box-shadow:
  inset 5px 5px 12px var(--shadow1),
  inset -5px -5px 12px var(--shadow2);
}

.search-wrap input{
  flex:1;
  border:none;
  outline:none;
  background:none;
  padding:14px;
  font-size:14px;
  color: var(--dark);
}

.search-wrap button{
  padding: 0 16px;
  height:50px;
  border:none;
  background:none;
  font-size:12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--dark);
  cursor: pointer;
}

/* SECTION */

.section-title{
  font-family: 'Syne', sans-serif;
  padding:24px 18px 14px;
  font-size:22px;
  font-weight:800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* BANNER */

.banner{
  margin:16px 18px 22px;
  height:200px;
  border-radius:32px;
  padding:24px;
  display:flex;
  align-items:flex-end;
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,#141e30,#243b55);
  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
}

.banner-title{
  font-family: 'Syne', sans-serif;
  color:#fff;
  font-size:32px;
  font-weight:800;
}

.banner-sub{
  color:#ddd;
  margin-top:4px;
  font-size: 14px;
}

.banner-badge{
  position:absolute;
  top:18px;
  right:18px;
  background:#fff;
  color:#111;
  padding:6px 16px;
  border-radius:20px;
  font-size:11px;
  font-weight:800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* APP GRID */

.app-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  padding:0 18px 20px;
}

.app-card{
  padding:24px 10px;
  border-radius:28px;
  text-align:center;
  background:var(--bg);
  box-shadow:
  8px 8px 16px var(--shadow1),
  -8px -8px 16px var(--shadow2);
  transition: transform 0.2s ease;
}

.app-card:active{
  transform: scale(0.97);
}

.app-icon-text{
  width:64px;
  height:64px;
  border-radius:22px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family: 'Syne', sans-serif;
  font-size:20px;
  font-weight: 800;
  color: var(--dark);
  box-shadow:
  inset 4px 4px 10px var(--shadow1),
  inset -4px -4px 10px var(--shadow2);
}

.app-name{
  font-family: 'Syne', sans-serif;
  margin-top:16px;
  font-size:16px;
  font-weight:800;
}

.app-type{
  margin-top:5px;
  color:var(--text-muted);
  font-size:12px;
}

/* LOGIN */

.login-box{
  margin:0 18px 25px;
  padding:32px 22px;
  border-radius:35px;
  background:var(--bg);
  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
}

.login-title{
  font-family: 'Syne', sans-serif;
  text-align:center;
  font-size:32px;
  font-weight:800;
  margin-bottom:28px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.input-box{
  width:100%;
  height:58px;
  border:none;
  outline:none;
  padding:0 18px;
  margin-bottom:20px;
  border-radius:18px;
  background:var(--bg);
  font-family: inherit;
  font-size: 14px;
  box-shadow:
  inset 5px 5px 12px var(--shadow1),
  inset -5px -5px 12px var(--shadow2);
}

.login-btn{
  width:100%;
  height:58px;
  border:none;
  border-radius:20px;
  background:var(--bg);
  font-family: 'Syne', sans-serif;
  font-size:18px;
  font-weight:800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--dark);
  box-shadow:
  8px 8px 16px var(--shadow1),
  -8px -8px 16px var(--shadow2);
  cursor: pointer;
  transition: all 0.2s ease;
}

.login-btn:active{
  box-shadow:
  inset 4px 4px 10px var(--shadow1),
  inset -4px -4px 10px var(--shadow2);
}

.forgot{
  margin-top:22px;
  text-align:center;
  color:var(--text-muted);
  font-size: 13px;
  cursor: pointer;
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  left:18px;
  right:18px;
  bottom:18px;
  height:75px;
  border-radius:30px;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:space-around;
  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
  z-index: 1000;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color:var(--text-muted);
  cursor: pointer;
}

.nav-label-top{
  font-family: 'Syne', sans-serif;
  font-size:16px;
  font-weight:800;
  margin-bottom:4px;
}

.active{
  color:var(--dark);
}

</style>
</head>
<body>

<!-- TOPBAR -->

<div class="topbar">
  <img src="https://i.postimg.cc/bNzXXs5R/Picsart-26-05-07-21-15-13-901.png" class="logo" alt="Logo">
  <div class="search-wrap">
    <input type="text" placeholder="Search applications...">
    <button>Find</button>
  </div>
</div>

<!-- BANNER -->

<div class="banner">
  <div>
    <div class="banner-title">CapCut Pro</div>
    <div class="banner-sub">Advanced Video Customization</div>
  </div>
  <div class="banner-badge">Free</div>
</div>

<!-- APPS GRID -->

<div class="section-title">
  Popular Discoveries
</div>

<div class="app-grid">

  <div class="app-card">
    <div class="app-icon-text">CC</div>
    <div class="app-name">CapCut</div>
    <div class="app-type">Video Editor</div>
  </div>

  <div class="app-card">
    <div class="app-icon-text">PA</div>
    <div class="app-name">Picsart</div>
    <div class="app-type">Photo Suite</div>
  </div>

  <div class="app-card">
    <div class="app-icon-text">IS</div>
    <div class="app-name">InShot</div>
    <div class="app-type">Media Tool</div>
  </div>

  <div class="app-card">
    <div class="app-icon-text">CV</div>
    <div class="app-name">Canva</div>
    <div class="app-type">Graphics Asset</div>
  </div>

</div>

<!-- ACCOUNT / LOGIN -->

<div class="section-title">
  User Portal
</div>

<form class="login-box" onsubmit="event.preventDefault();">
  <div class="login-title">Welcome</div>
  <input type="text" class="input-box" placeholder="Username">
  <input type="password" class="input-box" placeholder="Password">
  <button type="submit" class="login-btn">Sign In</button>
  <div class="forgot">Forgot Credentials?</div>
</form>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

  <div class="nav-item active">
    <div class="nav-label-top">H</div>
    Home
  </div>

  <div class="nav-item">
    <div class="nav-label-top">A</div>
    Apps
  </div>

  <div class="nav-item">
    <div class="nav-label-top">C</div>
    Center
  </div>

  <div class="nav-item">
    <div class="nav-label-top">P</div>
    Profile
  </div>

</div>

</body>
</html>
