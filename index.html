<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Comfortaa:wght@500&display=swap" rel="stylesheet">
<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Allura', cursive;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding-bottom: 40px;
  background: linear-gradient(135deg,
    #a8edea 0%,
    #fed6e3 30%,
    #d4b8ff 60%,
    #ffecd2 100%);
}

body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  top: -200px;
  left: -200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168,237,234,0.8), rgba(254,214,227,0.4));
  filter: blur(80px);
  z-index: 0;
  animation: drift1 8s ease-in-out infinite;
}

body::after {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  bottom: -150px;
  right: -150px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,184,255,0.8), rgba(255,236,210,0.4));
  filter: blur(80px);
  z-index: 0;
  animation: drift2 10s ease-in-out infinite;
}

@keyframes drift1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(60px, 40px); }
}

@keyframes drift2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-40px, -60px); }
}

.container {
  width: 92%;
  max-width: 800px;
  margin: auto;
  position: relative;
  z-index: 5;
}

.glass {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(25px) saturate(180%);
  -webkit-backdrop-filter: blur(25px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.55);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.04),
    inset 0 1px 1px rgba(255, 255, 255, 0.8);
}

.hero {
  margin-top: 20px;
  padding: 20px 25px;
  border-radius: 30px;
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: float 6s ease-in-out infinite;
}

.hero h1 {
  font-family: 'Comfortaa', sans-serif;
  font-size: 34px;
  color: #1a1a1a;
  line-height: 1.2;
  position: relative;
  z-index: 2;
}

.hero p {
  margin-top: 10px;
  font-size: 20px;
  color: #222;
  line-height: 1.3;
  position: relative;
  z-index: 2;
}

.rain-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.drop {
  position: absolute;
  bottom: 100%;
  width: 1.5px;
  height: 20px;
  background: linear-gradient(transparent, rgba(255, 255, 255, 0.75));
  animation: fall 4s linear infinite;
}

.drop:nth-child(1) { left: 8%; animation-delay: 0s; animation-duration: 3.5s; }
.drop:nth-child(2) { left: 24%; animation-delay: 0.7s; animation-duration: 4.2s; }
.drop:nth-child(3) { left: 38%; animation-delay: 1.3s; animation-duration: 3.7s; }
.drop:nth-child(4) { left: 55%; animation-delay: 0.2s; animation-duration: 4.5s; }
.drop:nth-child(5) { left: 70%; animation-delay: 1.1s; animation-duration: 3.9s; }
.drop:nth-child(6) { left: 86%; animation-delay: 1.8s; animation-duration: 3.6s; }
.drop:nth-child(7) { left: 94%; animation-delay: 0.4s; animation-duration: 4.1s; }
.drop:nth-child(8) { left: 16%; animation-delay: 1.5s; animation-duration: 3.8s; }

@keyframes fall {
  0% { transform: translateY(-20px); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateY(300px); opacity: 0; }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.card {
  padding: 8px;
  border-radius: 24px;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  animation: fadeUp 0.8s ease both;
}

.card:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.06);
}

.img-wrapper {
  border-radius: 18px;
  overflow: hidden;
  width: 100%;
  line-height: 0;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: auto;
  min-height: 140px;
  display: block;
  object-fit: contain;
  background: rgba(255,255,255,0.1);
  transition: transform 0.5s ease;
}

.card:hover img {
  transform: scale(1.03);
}

.download-btn {
  display: block;
  margin-top: 8px;
  width: 100%;
  text-align: center;
  text-decoration: none;
  font-family: 'Allura', cursive;
  font-size: 24px;
  color: #1a1a1a;
  padding: 6px 12px;
  border-radius: 15px;
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.65);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.8);
  transition: transform 0.3s ease, background 0.3s ease;
  cursor: pointer;
}

.download-btn:hover {
  transform: scale(1.02);
  background: rgba(255, 255, 255, 0.5);
}

/* LIGHTBOX MODAL SYSTEM */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  display: none;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.lightbox.active {
  display: flex;
  opacity: 1;
}

.lightbox-content {
  width: 90%;
  max-width: 500px;
  background: rgba(255, 255, 255, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 32px;
  padding: 15px;
  text-align: center;
  position: relative;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.close-btn {
  position: absolute;
  top: -15px;
  right: -15px;
  width: 40px;
  height: 40px;
  background: rgba(255, 255, 255, 0.8);
  border: none;
  border-radius: 50%;
  font-size: 24px;
  color: #1a1a1a;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1010;
}

.lightbox-main-img {
  width: 100%;
  max-height: 55vh;
  object-fit: contain;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
}

.lightbox .download-btn {
  width: 80%;
  margin-top: 15px;
  margin-bottom: 15px;
}

/* HORIZONTAL CAROUSEL INSIDE LIGHTBOX */
.lightbox-carousel {
  width: 100%;
  overflow-x: auto;
  white-space: nowrap;
  padding: 10px 5px;
  border-top: 1px solid rgba(255,255,255,0.3);
  scrollbar-width: thin;
}

.lightbox-carousel::-webkit-scrollbar {
  height: 4px;
}
.lightbox-carousel::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.5);
  border-radius: 10px;
}

.thumb-img {
  width: 60px;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
  margin-right: 8px;
  cursor: pointer;
  display: inline-block;
  border: 2px solid transparent;
  transition: transform 0.2s, border-color 0.2s;
}

.thumb-img:hover {
  transform: scale(1.05);
}

.thumb-img.active-thumb {
  border-color: #1a1a1a;
  transform: scale(1.05);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .hero {
    padding: 18px 20px;
    margin-top: 15px;
  }
  .hero h1 { font-size: 28px; }
  .hero p { font-size: 16px; line-height: 1.3; }
  .download-btn { font-size: 22px; padding: 5px 10px; }
}

</style>
</head>
<body>

<div class="container">

  <div class="hero glass">
    <div class="rain-container">
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
    </div>

    <h1>Welcome</h1>
    <p>
      You can download anything you want from this website and use it freely
      in your videos without any copyright issues. Explore premium visuals,
      cinematic backgrounds, aesthetic clips and high quality content to make
      your videos more beautiful, professional and attractive.
    </p>
  </div>

  <div class="grid" id="galleryGrid"></div>
</div>

<div class="lightbox" id="imageLightbox">
  <div class="lightbox-content">
    <button class="close-btn" onclick="closeLightbox()">&times;</button>
    <img src="" id="lightboxImg" class="lightbox-main-img" alt="Main View">
    <button id="lightboxDownloadBtn" class="download-btn">Download</button>
    <div class="lightbox-carousel" id="lightboxCarousel"></div>
  </div>
</div>

<script>
// Image array containing all your 41 images
const images = [
  "https://i.postimg.cc/MGCNgshG/847837100524cd94d019ec0aef6d06cd.jpg",
  "https://i.postimg.cc/7L2Q13bR/74869a4ae3a4d27efe63c344e7a9f474.jpg",
  "https://i.postimg.cc/MT0PNz7F/9bff13d1925aa0a39958ef5063419e75.jpg",
  "https://i.postimg.cc/bNV6KCnj/fbdfb8c0b52fa8009abd3ab3ffcdd007.jpg",
  "https://i.postimg.cc/MGVdfzFG/720519956c10816031add7725fc28b35.jpg",
  "https://i.postimg.cc/HWB3yZBv/1327fc64cdbc62212301e327e9e43477.jpg",
  "https://i.postimg.cc/N0qxcWfz/48e8f8a8031fb80842e0bd711f906a1a.jpg",
  "https://i.postimg.cc/sX39B7WH/8b5db21a1c6c69ec159460e174fdf82a.jpg",
  "https://i.postimg.cc/NfK8rgyh/caf94fdefa8b2af2d53412bd60a95858.jpg",

  "https://i.postimg.cc/g0m64d0G/1af01565e88b44dd22cd187973a2672a.jpg",
  "https://i.postimg.cc/2ybq3SHf/3618d191221fc4667c90d0c6c3814bbf.jpg",
  "https://i.postimg.cc/qvdtM0yY/49ef580a1e1e306b10f678cf1b44ea2e.jpg",
  "https://i.postimg.cc/TPth9DSt/b891c138b9b9bb7ebc6b08b85d90b93f.jpg",
  "https://i.postimg.cc/pVpsMNfd/3624c514112f6a76b7e124bf49ebe00d.jpg",
  "https://i.postimg.cc/3wkkJZnC/77ac40ee090c479e8ae201fa1327ea37.jpg",

  "https://i.postimg.cc/KzVwhm4j/55ece5dc88e2f14d249c28ac01b7771c.jpg",

  "https://i.postimg.cc/XYV2hrQp/e417b403fb0276781d6a674d6bb452f1.jpg",
  "https://i.postimg.cc/fL05XmTS/68a536f9fb19a1b56d95f143246c9fc0.jpg",
  "https://i.postimg.cc/pVzqLf64/24e3b9aae01a878b4a90d7039a236391.jpg",
  "https://i.postimg.cc/QdxbmRxR/4e13ac3b849d7e3388502910828e28fa.jpg"
];

const gridContainer = document.getElementById('galleryGrid');
const carouselContainer = document.getElementById('lightboxCarousel');
const lightbox = document.getElementById('imageLightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxDownloadBtn = document.getElementById('lightboxDownloadBtn');

// Build Main Grid and Carousel Items Dynamically
images.forEach((url, index) => {
  // Grid Card Element
  const card = document.createElement('div');
  card.className = 'card glass';
  card.innerHTML = `
    <div class="img-wrapper" onclick="openLightbox(${index})">
      <img src="${url}" alt="Visual ${index + 1}">
    </div>
    <button onclick="triggerDownload('${url}', 'visual-${index + 1}.jpg')" class="download-btn">Download</button>
  `;
  gridContainer.appendChild(card);

  // Carousel Thumbnails
  const thumb = document.createElement('img');
  thumb.src = url;
  thumb.className = 'thumb-img';
  thumb.id = `thumb-${index}`;
  thumb.onclick = () => selectLightboxImage(index);
  carouselContainer.appendChild(thumb);
});

let currentIndex = 0;

function openLightbox(index) {
  lightbox.classList.add('active');
  selectLightboxImage(index);
}

function closeLightbox() {
  lightbox.classList.remove('active');
}

function selectLightboxImage(index) {
  currentIndex = index;
  const targetUrl = images[index];
  
  lightboxImg.src = targetUrl;
  lightboxDownloadBtn.setAttribute('onclick', `triggerDownload('${targetUrl}', 'visual-${index + 1}.jpg')`);

  // Reset and set active state for thumbnails
  document.querySelectorAll('.thumb-img').forEach(img => img.classList.remove('active-thumb'));
  const activeThumb = document.getElementById(`thumb-${index}`);
  if (activeThumb) {
    activeThumb.classList.add('active-thumb');
    activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function triggerDownload(imgUrl, fileName) {
  fetch(imgUrl)
    .then(response => response.blob())
    .then(blob => {
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
    })
    .catch(() => {
      window.open(imgUrl, '_blank');
    });
}

// Close lightbox on clicking outside content area
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) {
    closeLightbox();
  }
});
</script>

</body>
</html>
